<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Matemática Pro</title>

<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
    margin-bottom: 70px;
}

.card {
    background: #1e1e1e;
    padding: 20px;
    border-radius: 20px;
    margin: 20px;
}

input {
    padding: 10px;
    margin: 5px;
    width: 80px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: #00c853;
    color: white;
}

footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
    color: #00ffcc;
    padding: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>📚 App Matemática</h1>

<!-- PROMEDIO -->
<div class="card">
<h2>🧮 Promedio</h2>

<input type="number" id="n1" placeholder="Nota 1">
<input type="number" id="n2" placeholder="Nota 2">
<input type="number" id="n3" placeholder="Nota 3">
<input type="number" id="n4" placeholder="Nota 4">

<br>
<button onclick="promedio()">Calcular</button>

<p id="resProm"></p>
<p id="procProm"></p>
</div>

<!-- CÍRCULO -->
<div class="card">
<h2>🔵 Área del círculo</h2>

<input type="number" id="radio" placeholder="Radio">

<br>
<button onclick="circulo()">Calcular</button>

<p id="resCir"></p>
<p id="procCir"></p>
</div>

<!-- TRIÁNGULO -->
<div class="card">
<h2>🔺 Área del triángulo</h2>

<input type="number" id="base" placeholder="Base">
<input type="number" id="altura" placeholder="Altura">

<br>
<button onclick="triangulo()">Calcular</button>

<p id="resTri"></p>
<p id="procTri"></p>
</div>

<!-- PORCENTAJE -->
<div class="card">
<h2>📊 Porcentaje</h2>

<input type="number" id="num" placeholder="Número">
<input type="number" id="por" placeholder="%">

<br>
<button onclick="porcentaje()">Calcular</button>

<p id="resPor"></p>
<p id="procPor"></p>
</div>

<!-- PITÁGORAS -->
<div class="card">
<h2>📐 Pitágoras</h2>

<input type="number" id="a" placeholder="a">
<input type="number" id="b" placeholder="b">

<br>
<button onclick="pitagoras()">Calcular</button>

<p id="resPit"></p>
<p id="procPit"></p>
</div>

<!-- ECUACIÓN -->
<div class="card">
<h2>📈 Ecuación Cuadrática</h2>

<input type="number" id="A" placeholder="a">
<input type="number" id="B" placeholder="b">
<input type="number" id="C" placeholder="c">

<br>
<button onclick="ecuacion()">Calcular</button>

<p id="resEc"></p>
<p id="procEc"></p>
</div>

<footer>
🚀 App creada por David Varela
</footer>

<script>

// PROMEDIO
function promedio() {
let n1 = parseFloat(document.getElementById("n1").value)||0;
let n2 = parseFloat(document.getElementById("n2").value)||0;
let n3 = parseFloat(document.getElementById("n3").value)||0;
let n4 = parseFloat(document.getElementById("n4").value)||0;

let suma = n1+n2+n3+n4;
let prom = suma/4;

document.getElementById("resProm").innerText = "Resultado: " + prom.toFixed(2);

document.getElementById("procProm").innerText =
"Paso 1: "+n1+"+"+n2+"+"+n3+"+"+n4+"="+suma+
"\nPaso 2: "+suma+"/4="+prom.toFixed(2);
}

// CÍRCULO
function circulo() {
let r = parseFloat(document.getElementById("radio").value)||0;
let area = 3.1416*r*r;

document.getElementById("resCir").innerText = "Área: " + area.toFixed(2);

document.getElementById("procCir").innerText =
"π × r² = 3.1416 × "+r+"² = "+area.toFixed(2);
}

// TRIÁNGULO
function triangulo() {
let b = parseFloat(document.getElementById("base").value)||0;
let h = parseFloat(document.getElementById("altura").value)||0;

let area = (b*h)/2;

document.getElementById("resTri").innerText = "Área: " + area.toFixed(2);

document.getElementById("procTri").innerText =
"("+b+"×"+h+")/2 = "+area.toFixed(2);
}

// PORCENTAJE
function porcentaje() {
let n = parseFloat(document.getElementById("num").value)||0;
let p = parseFloat(document.getElementById("por").value)||0;

let resultado = (n*p)/100;

document.getElementById("resPor").innerText = "Resultado: " + resultado;

document.getElementById("procPor").innerText =
"("+n+"×"+p+")/100 = "+resultado;
}

// PITÁGORAS
function pitagoras() {
let x = parseFloat(document.getElementById("a").value)||0;
let y = parseFloat(document.getElementById("b").value)||0;

let c = Math.sqrt(x*x + y*y);

document.getElementById("resPit").innerText = "Hipotenusa: " + c.toFixed(2);

document.getElementById("procPit").innerText =
"√("+x+"² + "+y+"²) = "+c.toFixed(2);
}

// ECUACIÓN
function ecuacion() {
let a = parseFloat(document.getElementById("A").value)||0;
let b = parseFloat(document.getElementById("B").value)||0;
let c = parseFloat(document.getElementById("C").value)||0;

let d = (b*b) - (4*a*c);

let x1 = (-b + Math.sqrt(d))/(2*a);
let x2 = (-b - Math.sqrt(d))/(2*a);

document.getElementById("resEc").innerText =
"X1: " + x1.toFixed(2) + " | X2: " + x2.toFixed(2);

document.getElementById("procEc").innerText =
"Discriminante: "+d+
"\nFórmula: (-b ± √(b²-4ac)) / 2a";
}

</script>

</body>
</html>
